name: release-evidence

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-attest:
    name: Build, SBOM, and attest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Verify tag and package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(
            python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$tag_version" = "$package_version"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Run release quality gate
        run: |
          uv lock --check
          uv sync --frozen --all-groups
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest

      - name: Build distributions
        run: |
          uv build
          mkdir -p build

      - name: Generate checksums
        working-directory: dist
        run: sha256sum ./*.whl ./*.tar.gz > SHA256SUMS

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./build/loop-schemas.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest SBOM
        id: sbom-attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: ./build/loop-schemas.spdx.json

      - name: Preserve release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: loop-schemas-${{ github.ref_name }}-release-evidence
          if-no-files-found: error
          path: |
            dist/*
            build/loop-schemas.spdx.json
            ${{ steps.provenance.outputs.bundle-path }}
            ${{ steps.sbom-attestation.outputs.bundle-path }}
